<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Compras PRO MAX</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial, sans-serif; }
.fade-in { animation: fadeIn 0.3s ease-in-out; }
@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
</style>
</head>

<body class="bg-gray-100 p-6">

<div class="max-w-5xl mx-auto">
<h1 class="text-4xl font-bold mb-6">🛒 Lista de Compras PRO MAX</h1>

<!-- INPUT AREA -->
<div class="grid grid-cols-1 md:grid-cols-4 gap-2 mb-4">
<input id="itemInput" class="p-2 border rounded" placeholder="Nome do item">
<input id="priceInput" type="number" class="p-2 border rounded" placeholder="Preço">
<input id="categoryInput" class="p-2 border rounded" placeholder="Categoria">
<button onclick="addItem()" class="bg-blue-600 text-white rounded">Adicionar</button>
</div>

<!-- SEARCH + FILTER -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-2 mb-4">
<input id="searchInput" class="p-2 border rounded" placeholder="Buscar..." oninput="render()">
<select id="filterStatus" class="p-2 border rounded" onchange="render()">
<option value="all">Todos</option>
<option value="pending">Pendentes</option>
<option value="done">Comprados</option>
</select>
<select id="filterCategory" class="p-2 border rounded" onchange="render()">
<option value="all">Todas categorias</option>
</select>
</div>

<!-- LIST -->
<ul id="list" class="bg-white p-4 rounded shadow space-y-2"></ul>

<!-- ACTIONS -->
<div class="flex justify-between mt-4">
<span id="total" class="font-bold"></span>
<div class="space-x-2">
<button onclick="exportData()" class="bg-green-500 text-white px-3 py-1 rounded">Exportar</button>
<button onclick="importData()" class="bg-yellow-500 text-white px-3 py-1 rounded">Importar</button>
<button onclick="clearAll()" class="text-red-600">Limpar</button>
</div>
</div>

<!-- CHART -->
<canvas id="chart" class="mt-6"></canvas>
</div>

<script>
// ============================
// STATE
// ============================
let items = JSON.parse(localStorage.getItem('items')) || [];
let chart;

// ============================
// SAVE
// ============================
function save() {
localStorage.setItem('items', JSON.stringify(items));
}

// ============================
// ADD ITEM
// ============================
function addItem() {
const name = itemInput.value.trim();
const price = parseFloat(priceInput.value) || 0;
const category = categoryInput.value.trim() || 'Geral';

if (!name) return alert('Digite um item');

items.push({
id: Date.now(),
name,
price,
category,
done: false,
createdAt: new Date().toISOString()
});

itemInput.value = '';
priceInput.value = '';
categoryInput.value = '';

save();
render();
}

// ============================
// DELETE
// ============================
function removeItem(id) {
items = items.filter(i => i.id !== id);
save();
render();
}

// ============================
// TOGGLE
// ============================
function toggleItem(id) {
items = items.map(i => i.id === id ? {...i, done: !i.done} : i);
save();
render();
}

// ============================
// EDIT
// ============================
function editItem(id) {
const item = items.find(i => i.id === id);
const newName = prompt('Editar nome:', item.name);
if (newName !== null) item.name = newName;

const newPrice = prompt('Editar preço:', item.price);
if (newPrice !== null) item.price = parseFloat(newPrice);

save();
render();
}

// ============================
// CLEAR
// ============================
function clearAll() {
if (!confirm('Apagar tudo?')) return;
items = [];
save();
render();
}

// ============================
// EXPORT
// ============================
function exportData() {
const data = JSON.stringify(items);
const blob = new Blob([data], {type: 'application/json'});
const url = URL.createObjectURL(blob);

const a = document.createElement('a');
a.href = url;
a.download = 'lista.json';
a.click();
}

// ============================
// IMPORT
// ============================
function importData() {
const input = document.createElement('input');
input.type = 'file';
input.accept = 'application/json';

input.onchange = e => {
const file = e.target.files[0];
const reader = new FileReader();

reader.onload = () => {
items = JSON.parse(reader.result);
save();
render();
};

reader.readAsText(file);
};

input.click();
}

// ============================
// RENDER
// ============================
function render() {
const list = document.getElementById('list');
list.innerHTML = '';

const search = searchInput.value.toLowerCase();
const status = filterStatus.value;
const categoryFilter = filterCategory.value;

let filtered = items.filter(i => i.name.toLowerCase().includes(search));

if (status === 'pending') filtered = filtered.filter(i => !i.done);
if (status === 'done') filtered = filtered.filter(i => i.done);
if (categoryFilter !== 'all') filtered = filtered.filter(i => i.category === categoryFilter);

filtered.forEach(item => {
const li = document.createElement('li');
li.className = 'p-2 border rounded flex justify-between items-center fade-in';

li.innerHTML = `
<div>
<span onclick="toggleItem(${item.id})" class="cursor-pointer ${item.done ? 'line-through text-gray-400' : ''}">
${item.name} (R$ ${item.price.toFixed(2)}) - <small>${item.category}</small>
</span>
</div>
<div class="space-x-2">
<button onclick="editItem(${item.id})">✏️</button>
<button onclick="removeItem(${item.id})" class="text-red-500">✕</button>
</div>
`;

list.appendChild(li);
});

updateTotal();
updateChart();
updateCategories();
}

// ============================
// TOTAL
// ============================
function updateTotal() {
const total = items.reduce((sum, i) => sum + i.price, 0);
totalEl.innerText = 'Total: R$ ' + total.toFixed(2);
}

// ============================
// CATEGORIES
// ============================
function updateCategories() {
const select = filterCategory;
const categories = [...new Set(items.map(i => i.category))];

select.innerHTML = '<option value="all">Todas categorias</option>';

categories.forEach(cat => {
const opt = document.createElement('option');
opt.value = cat;
opt.innerText = cat;
select.appendChild(opt);
});
}

// ============================
// CHART
// ============================
function updateChart() {
const done = items.filter(i => i.done).length;
const pending = items.length - done;

const ctx = document.getElementById('chart');
if (chart) chart.destroy();

chart = new Chart(ctx, {
type: 'bar',
data: {
labels: ['Comprados', 'Pendentes'],
datasets: [{ data: [done, pending] }]
}
});
}

// ============================
// INIT
// ============================
render();

// ============================
// EXTRA FEATURES
// ============================

// Atalho ENTER
itemInput.addEventListener('keypress', e => {
if (e.key === 'Enter') addItem();
});

// Notificação simples
function notify(msg) {
const div = document.createElement('div');
div.innerText = msg;
div.className = 'fixed bottom-4 right-4 bg-black text-white p-2 rounded';
document.body.appendChild(div);
setTimeout(() => div.remove(), 2000);
}

// Auto backup
setInterval(() => {
localStorage.setItem('backup', JSON.stringify(items));
}, 5000);

// Restaurar backup
window.addEventListener('load', () => {
const backup = localStorage.getItem('backup');
if (backup && items.length === 0) {
if (confirm('Restaurar backup?')) {
items = JSON.parse(backup);
save();
render();
}
}
});

</script>

</body>
</html>
